<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSD Calculator - ori's mania utils</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="overlay" class="overlay">
        <div class="header">
            <div class="title-block">
                <div class="song-title-row">
                    <span id="song-title">Waiting for osu!...</span>
                    <span id="song-difficulty"></span>
                </div>
                <span id="song-artist"></span>
            </div>
            <div class="status-block">
                <span id="map-type-badge" class="map-type-badge hidden"></span>
                <span id="connection-dot" class="dot disconnected"></span>
            </div>
        </div>

        <div class="metrics-panel">
            <div class="chart-wrap">
                <canvas id="radar-chart" width="170" height="170"></canvas>
            </div>
            <div class="skill-list">
                <div class="skill-row overall-row">
                    <span class="skill-label">Overall</span>
                    <span id="val-overall" class="skill-val overall-val">-</span>
                </div>
                <div class="skill-row">
                    <span class="skill-label">Stream</span>
                    <span id="val-stream" class="skill-val">-</span>
                </div>
                <div class="skill-row">
                    <span class="skill-label">Jumpstream</span>
                    <span id="val-jumpstream" class="skill-val">-</span>
                </div>
                <div class="skill-row">
                    <span class="skill-label">Handstream</span>
                    <span id="val-handstream" class="skill-val">-</span>
                </div>
                <div class="skill-row">
                    <span class="skill-label">Stamina</span>
                    <span id="val-stamina" class="skill-val">-</span>
                </div>
                <div class="skill-row">
                    <span class="skill-label">JackSpeed</span>
                    <span id="val-jackspeed" class="skill-val">-</span>
                </div>
                <div class="skill-row">
                    <span class="skill-label">Chordjack</span>
                    <span id="val-chordjack" class="skill-val">-</span>
                </div>
                <div class="skill-row">
                    <span class="skill-label">Technical</span>
                    <span id="val-technical" class="skill-val">-</span>
                </div>
            </div>
        </div>



        <div id="debug-bar" class="debug-bar hidden">
            <span id="debug-msg"></span>
        </div>
    </div>

    <script type="module" src="main.js?v=3"></script>

</body>
</html>
