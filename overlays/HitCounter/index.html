<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit Counter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="hit-counter" class="hit-counter">
        <div class="judgment-item max" data-hit-index="0">
            <div class="j-header">
                <span class="j-dot hit-part" data-hit-part="dot"></span>
                <span class="j-label hit-part" data-hit-part="label">MAX</span>
            </div>
            <span id="val-max" class="j-val hit-part" data-hit-part="value">0</span>
        </div>
        <div class="judgment-item perf" data-hit-index="1">
            <div class="j-header">
                <span class="j-dot hit-part" data-hit-part="dot"></span>
                <span class="j-label hit-part" data-hit-part="label">PERF</span>
            </div>
            <span id="val-perf" class="j-val hit-part" data-hit-part="value">0</span>
        </div>
        <div class="judgment-item great" data-hit-index="2">
            <div class="j-header">
                <span class="j-dot hit-part" data-hit-part="dot"></span>
                <span class="j-label hit-part" data-hit-part="label">GREAT</span>
            </div>
            <span id="val-great" class="j-val hit-part" data-hit-part="value">0</span>
        </div>
        <div class="judgment-item good" data-hit-index="3">
            <div class="j-header">
                <span class="j-dot hit-part" data-hit-part="dot"></span>
                <span class="j-label hit-part" data-hit-part="label">GOOD</span>
            </div>
            <span id="val-good" class="j-val hit-part" data-hit-part="value">0</span>
        </div>
        <div class="judgment-item bad" data-hit-index="4">
            <div class="j-header">
                <span class="j-dot hit-part" data-hit-part="dot"></span>
                <span class="j-label hit-part" data-hit-part="label">BAD</span>
            </div>
            <span id="val-bad" class="j-val hit-part" data-hit-part="value">0</span>
        </div>
        <div class="judgment-item miss" data-hit-index="5">
            <div class="j-header">
                <span class="j-dot hit-part" data-hit-part="dot"></span>
                <span class="j-label hit-part" data-hit-part="label">MISS</span>
            </div>
            <span id="val-miss" class="j-val hit-part" data-hit-part="value">0</span>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
