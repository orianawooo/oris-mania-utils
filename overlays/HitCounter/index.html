<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit Counter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="hit-counter" class="hit-counter">
        <div class="judgment-item max">
            <div class="j-header">
                <span class="j-dot"></span>
                <span class="j-label">MAX</span>
            </div>
            <span id="val-max" class="j-val">0</span>
        </div>
        <div class="judgment-item perf">
            <div class="j-header">
                <span class="j-dot"></span>
                <span class="j-label">PERF</span>
            </div>
            <span id="val-perf" class="j-val">0</span>
        </div>
        <div class="judgment-item great">
            <div class="j-header">
                <span class="j-dot"></span>
                <span class="j-label">GREAT</span>
            </div>
            <span id="val-great" class="j-val">0</span>
        </div>
        <div class="judgment-item good">
            <div class="j-header">
                <span class="j-dot"></span>
                <span class="j-label">GOOD</span>
            </div>
            <span id="val-good" class="j-val">0</span>
        </div>
        <div class="judgment-item bad">
            <div class="j-header">
                <span class="j-dot"></span>
                <span class="j-label">BAD</span>
            </div>
            <span id="val-bad" class="j-val">0</span>
        </div>
        <div class="judgment-item miss">
            <div class="j-header">
                <span class="j-dot"></span>
                <span class="j-label">MISS</span>
            </div>
            <span id="val-miss" class="j-val">0</span>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
