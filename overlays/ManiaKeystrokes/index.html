<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mania Keystrokes</title>
    <link rel="stylesheet" href="keystrokes.css">
</head>
<body>
    <div class="overlay-wrapper">
        <div id="keystrokes-frame" aria-hidden="true" data-shape="rounded"></div>
        <canvas id="keystrokes-canvas"></canvas>
        <div id="keystrokes-container">
            <div class="key" id="key-0" data-shape="rounded">
                <span class="key-label">D</span>
                <span class="key-ms">0ms</span>
            </div>
            <div class="key" id="key-1" data-shape="rounded">
                <span class="key-label">F</span>
                <span class="key-ms">0ms</span>
            </div>
            <div class="key" id="key-2" data-shape="rounded">
                <span class="key-label">J</span>
                <span class="key-ms">0ms</span>
            </div>
            <div class="key" id="key-3" data-shape="rounded">
                <span class="key-label">K</span>
                <span class="key-ms">0ms</span>
            </div>
        </div>
    </div>
    <div id="debug-info">Connecting...</div>
    <script type="module" src="keystrokes.js"></script>
</body>
</html>
